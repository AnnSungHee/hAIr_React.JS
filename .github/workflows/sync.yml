# 이름
name: Sync Fork

on:
  schedule:
    - cron: '0 * * * *' # 매일 자정에 실행 (UTC 기준)
  workflow_dispatch: # 수동으로 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v2
        with:
          persist-credentials: false # 권한 문제 방지
          fetch-depth: 0 # 전체 기록 가져오기

      - name: Configure the upstream repository
        run: git remote add upstream https://github.com/Innovative-AI-Makers-I-AM/hAIr_React.JS.git
        # 위의 URL을 원본 저장소의 URL로 변경하세요.

      - name: Fetch all branches from the upstream repository
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main
          git push origin main
        # 'main' 브랜치를 사용하는 경우. 만약 다른 브랜치를 사용한다면 적절히 변경하세요.
